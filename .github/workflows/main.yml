name: Deploy to Dokku Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Cloning repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Push to dokku
      uses: dokku/github-action@master
      with:
        git_remote_url: 'ssh://dokku@18.226.181.200:22/gerenciador'
        ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
